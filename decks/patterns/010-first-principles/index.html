<div class="bc-slide-title">Design is Tradeoffs</div>
<figure class="bc-framed-image" style="width:25%;margin-left:1rem;"><p><img src="/_astro/joel.DJvPjMSB_Z2c2Jdt.webp" alt="Image sans description." loading="lazy" decoding="async" width="383" height="567"></p></figure>
<blockquote>
<p>Design, for my purposes, is about making tradeoffs.
<a href="https://www.joelonsoftware.com/2006/01/26/great-design-what-is-design-first-draft/" rel="nofollow" target="_blank">Joel Spolsky</a></p>
</blockquote>
<h4 id="design-is">Design is:</h4>
<ul>
<li>Making stuff</li>
<li>Within constraints</li>
<li>Optimizing priorities</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="ZSgqPw" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;4&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Example: Trashcan</div>
<figure style="width:30%;margin-left:1rem;"><p><img src="/_astro/trash.DEuatvia_Z13IjeH.webp" alt="Image sans description." loading="lazy" decoding="async" width="800" height="800"></p></figure>
<h4 id="constraints">Constraints</h4>
<ol>
<li>Keeps trash off streets</li>
<li>Cheap enough for the city to afford</li>
<li>Light enough to lift</li>
<li>Big enough for lots of trash</li>
<li>Doesn’t take up too much sidewalk space</li>
<li>Heavy enough to not blow away</li>
</ol>
</template><!--astro:end--></astro-island><astro-island uid="ZSgiP9" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;5&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Design Over Time</div>
<figure style="height:60vh;width:auto;margin-left:1rem;"><p><img src="/_astro/remote.CEIb8ux2_1oXWOv.webp" alt="Image sans description." loading="lazy" decoding="async" width="214" height="818"></p></figure>
<ul>
<li>Choices mean winners and losers</li>
<li>Nothing is free</li>
<li>Examples:
<ul>
<li>TV remote buttons</li>
<li>Complexity and Extensibility</li>
</ul>
</li>
<li>Joel Spolsky: Design adds value faster than it adds cost.</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="ZSgaOL" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;6&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>

<div class="text-8xl text-left pl-10 font-semibold pt-20">What’s Patterns?</div>
</template><!--astro:end--></astro-island><astro-island uid="ZSfTO1" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;8&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">On Building Stuff</div>
<ul>
<li>People have been building structures for millennia</li>
<li>Traditions evolved in harmony with their context</li>
<li>Before inventing new techniques, try to understand common problems and solutions</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="ZSfLND" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;9&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Patterns are Traditions</div>
<ul>
<li>Modernists advocate creating things from first principles</li>
<li>Traditionalists advocate tradition for its own sake:
<ul>
<li>Maybe there’s wisdom embedded within the tradition</li>
<li>Design is path dependent</li>
</ul>
</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29wx35" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;10&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Without Patterns</div>
<figure style="width:30%;height:auto;"><p><img src="/_astro/blob.Dy9hyXyJ_Z2aEXfE.webp" alt="Image sans description." loading="lazy" decoding="async" width="800" height="533"></p></figure>
<ul>
<li>Start from first principles</li>
<li>Avoid influence from traditional forms</li>
<li>Associated with modernism</li>
<li>Downsides:
<ul>
<li>Unnecessarily surprising</li>
<li>Silly</li>
<li>Naive</li>
</ul>
</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29wp2H" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;11&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Chesterton’s Fence</div>
<blockquote>
<p>There exists …a gate erected across a road. The more modern type
of reformer goes gaily up to it and says, <strong>“I don’t see the use of this; let us
clear it away.”</strong><br/>
The more intelligent type of reformer will do well to answer:
“If you don’t see the use of it, I certainly won’t let you clear it away.
Go away and think. Then, when you can come back and tell me that you do
see the use of it, I may allow you to destroy it.”</p>
</blockquote>
</template><!--astro:end--></astro-island><astro-island uid="Z29wh2k" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;12&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">What’s a Pattern?</div>
<ul>
<li>Lots of problems come with similar design constraints</li>
<li>e.g. Cities. Building New York wasn’t that much different than building Cairo</li>
</ul>
<blockquote>
<p>A <strong><em>pattern</em></strong> is a common solution to a common set of design constraints</p>
</blockquote>
</template><!--astro:end--></astro-island><astro-island uid="Z29w91W" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;13&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Same but different</div>
<figure class="bc-framed-image" style="margin-left:2rem;"><p><img src="/_astro/alexander.Djz_Xy3N_YejK3.webp" alt="Image sans description." loading="lazy" decoding="async" width="159" height="236"></p></figure>
<blockquote>
<p>A <strong>pattern</strong> describes a problem which occurs over and over again in
our environment, and then describes the core of the solution to that
problem, in such a way that you can use this solution a million times
over, without ever doing it the same way twice.</p>
<p>— <em>Christopher Alexander</em></p>
</blockquote>
</template><!--astro:end--></astro-island><astro-island uid="Z29w11z" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;14&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="text-8xl text-left pl-10 font-semibold pt-20">Aside: Architecture</div>
</template><!--astro:end--></astro-island><astro-island uid="Z29vS1c" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;15&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Pattern: Access To Water</div>
<figure style="width:30%;"><p><img src="/_astro/pre-big-dig.DvpjhqmY_Zud76h.webp" alt="Image sans description." loading="lazy" decoding="async" width="1024" height="683"></p></figure>
<ul>
<li>Lots of cities:
<ul>
<li>London</li>
<li>Manhattan</li>
<li>Rome</li>
<li>Cairo</li>
</ul>
</li>
<li>One pattern in common: access to water</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29vK0O" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;16&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Anti-Pattern: Block Water</div>
<ul>
<li><strong><em>Example</em></strong>: Boston had a big elevated highway between downtown and the ocean
<ul>
<li>Limited ‘access to water’</li>
<li>Limited transportation options</li>
</ul>
</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29vC0r" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;17&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Pattern Pride!</div>
<figure style="width:30%;"><p><img src="/_astro/post-big-dig.BtH2T2m5_1pHKzz.webp" alt="Image sans description." loading="lazy" decoding="async" width="640" height="480"></p></figure>
<ul>
<li>Bad pattern choices have costs
<ul>
<li>Human well being</li>
<li>Money</li>
</ul>
</li>
<li>A big dig was the right pattern
<ul>
<li>Better access to water</li>
<li>More transportation options</li>
<li>Most valuable real estate in the city</li>
</ul>
</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29vu04" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;18&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Kitchen Patterns</div>
<figure style="width:30%;"><p><img src="/_astro/bungalow.Bn_u6EmA_Z12Ijt.webp" alt="Image sans description." loading="lazy" decoding="async" width="275" height="183"></p></figure>
<figure style="width:30%;clear:right;"><p><img src="/_astro/whitehouse.Cowxfl2__Z1oR1Kn.webp" alt="Image sans description." loading="lazy" decoding="async" width="662" height="373"></p></figure>
<ul>
<li>Farmhouse Kitchen
<ul>
<li>Cooking</li>
<li>Eating</li>
<li>Hanging out</li>
</ul>
</li>
<li>Whitehouse Kitchen
<ul>
<li>In the basement</li>
<li>Residents don’t cook</li>
<li>Eating happens elsewhere</li>
</ul>
</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29vlYG" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;19&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Pattern Modesty</div>
<ul>
<li>Often a choice of patterns is self-evident given constraints</li>
<li>But there’s still value:
<ul>
<li>Borrow from the best designs</li>
<li>Common vocabulary</li>
</ul>
</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29ssQo" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;20&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="text-8xl text-left pl-10 font-semibold pt-20">Patterns in Software</div>
</template><!--astro:end--></astro-island><astro-island uid="Z29skQ1" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;21&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Oldies, Goodies</div>
<figure style="width:30%;"><p><img src="/_astro/tag-team.CVwXk0Bf_Zsbjgu.webp" alt="Image sans description." loading="lazy" decoding="async" width="1000" height="1183"></p></figure>
<blockquote>
<p>I’m taking it back to the old school<br/>
’Cause I’m an old fool<br/>
Who’s so cool<br/>
— <a href="http://example.com" rel="nofollow" target="_blank">Tag team</a></p>
</blockquote>
<ul>
<li>Design patterns is an old concept</li>
<li>Only a problem if you are trying to sell people new stuff</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29scPD" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;22&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Back in 1994</div>
<figure style="width:20%;"><p><img src="/_astro/gof.BNNpZRXE_2gPEhe.webp" alt="Image sans description." loading="lazy" decoding="async" width="534" height="669"></p></figure>
<ul>
<li>Gang of Four</li>
<li>Modest catalog</li>
<li>A pattern is:
<ul>
<li>Classic solution to a common problem</li>
<li>Good advice, pre-packaged</li>
<li>Not a library</li>
<li>Usually object-oriented</li>
</ul>
</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29s4Pg" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;23&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Why Patterns?</div>
<h4 id="two-reasons">Two reasons—</h4>
<ol>
<li>Leverage tried and true solutions</li>
<li>Use a common vocabulary</li>
</ol>
<ul>
<li>Express intent</li>
<li>Understand discussions</li>
<li>Name things</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29rVOS" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;24&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Patterns, Idioms, Architecture</div>
<ul>
<li><strong>Idiom</strong> depends on a specific technology.
<ul>
<li>Ex. <a href="https://en.wikipedia.org/wiki/Resource_acquisition_is_initialization" rel="nofollow" target="_blank">RAII</a></li>
</ul>
</li>
<li><strong>Pattern</strong> is somewhere in the middle</li>
<li><strong>Architecture</strong> is higher level</li>
<li><strong>Architectural style</strong> is higher still</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29rNOv" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;25&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Patterns Can Be Abused</div>
<h4 id="the-hard-thing-about-learning-patterns-is-knowing-when-to-use-them">The hard thing about learning patterns is knowing when to use them.</h4>
<ul>
<li>Patterns exist in tension with each other</li>
<li>Not everything called a pattern is a good idea</li>
<li>Not every good idea is a good idea for you</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29rFO8" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;26&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">A classic is</div>
<figure style="width:30%;"><p><img src="/_astro/rockstar.CWM5_k35_1fGBEX.webp" alt="Image sans description." loading="lazy" decoding="async" width="2500" height="1436"></p></figure>
<ul>
<li>Something that withstands the test of time</li>
<li>Or something that people a long time ago thought was cool</li>
<li>Just because something’s old doesn’t mean it’s good… or bad.</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29rxNK" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;27&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">PG on Patterns</div>
<figure class="bc-framed-image" style="width:25%;margin-left:2rem;"><p><img src="/_astro/pg.BYjNBhSP_Z2tdx0j.webp" alt="Image sans description." loading="lazy" decoding="async" width="262" height="354"></p></figure>
<blockquote>
<p>In the OO world you hear a good deal about “patterns”. When I
see patterns in my programs, I consider it a sign of trouble.<br/>
The shape of a program should reflect only the problem it needs
to solve. Any other regularity in the code is a sign, to me at
least, that I’m using abstractions that aren’t powerful enough.
— <a href="www.paulgraham.com/icad.html">Paul Graham</a></p>
</blockquote>
</template><!--astro:end--></astro-island><astro-island uid="Z29rpNn" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;28&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Complaints</div>
<ol>
<li>Patterns are often badly applied</li>
<li>Patterns may point out other inadequacies</li>
</ol>
<ul>
<li>In your programming language — e.g. no metaprogramming</li>
<li>In your libraries— e.g. boost flyweight, spirit</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29rhN0" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;29&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="text-8xl text-left pl-10 font-semibold pt-20">Case Study</div>
</template><!--astro:end--></astro-island><astro-island uid="Z29ooEH" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;30&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Database Connections</div>
<ul>
<li>Problem: Accessing relational databases from application code.</li>
<li>The Java interfaces were heavily influenced by Design Patterns vocabulary, but in any case reflect far older ideas.</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29ogEk" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;31&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Problem Statement</div>
<ul>
<li>Software needs persistence</li>
<li>For <strong>reasons</strong>, an RDBMS is the mechanism here</li>
<li>We want to:
<ul>
<li>Open connection</li>
<li>Do CRUD</li>
<li>Close connection</li>
</ul>
</li>
<li>As a general principle, our solution should produce Habitable, Testable, Secure, and Performant code</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29o8DW" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;32&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Constraints</div>
<ol>
<li>Vendor Neutrality</li>
<li>DB Identity Independence</li>
<li>DBAs Exist (Someone Else Does the Schema)</li>
</ol>
</template><!--astro:end--></astro-island><astro-island uid="Z29o0Dz" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;33&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Pattern: Layered Architecture</div>
<p>The JDBC architecture ensures vendor independence through a layered architecture with a separation of concerns:</p>
<ul>
<li>Application</li>
<li>JDBC Infrastructure</li>
<li>Vendor Driver</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29nRDc" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;34&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Solution Notes</div>
<ul>
<li>Each layer implemented and tested independently</li>
<li>Each component is owned by naturally independent entities.
<ul>
<li>e.g. The DB Vendor wouldn’t help implement applications.</li>
</ul>
</li>
<li>Vendor Neutrality is provided by the JDBC Manager.</li>
<li>Location Independence is guaranteed by the JDBC API</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29nJCO" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;35&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">Consequences</div>
<ul>
<li>API and Vendor code are depend on a specific JDBC API/Framework version.</li>
<li>Application developers will not have access to vendor-specific features</li>
<li>Applications may be developed without any assistance from a vendor</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29nBCr" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;36&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
<div class="bc-slide-title">More Consequences</div>
<ul>
<li>The ideas of Layered Applications and Separation of Concerns predate the Design Patterns vocabulary</li>
<li>Vocabulary transforms discussion.
<ul>
<li>Talk about what makes a good layered architecture and a stable separation of concerns</li>
<li>Talk about bad layerings or poorly chosen module boundaries (Anti-Patterns).</li>
<li>e.g. Don’t base a layering on Starbucks’ current org structure (MSFT frequently made this mistake).</li>
</ul>
</li>
</ul>
</template><!--astro:end--></astro-island><astro-island uid="Z29ntC4" component-url="/_astro/Slide.CdE2JuJF.js" component-export="Slide" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;slideIndex&quot;:[0,&quot;37&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;Slide&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template>
