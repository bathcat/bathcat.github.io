understanding of PowerShell and its mechanics for the Windows platform.
The course begins with an introduction to Powershell and its fundamentals in creating
sophisticated automation scripts. Next, it demonstrates integration of multiple collaboration tool
sets and services. The course concludes by teaching security to build a strong base for effective
usage of the language.</p>
<h3 id="duration">Duration</h3>
<p>3 Days</p>
<h2 id="objectives">Objectives</h2>
<p>Upon completion of this course, students will be able to:</p>
<ul>
<li>Use PowerShell to get key information about a Windows system using various search and filter techniques</li>
<li>Effectively leverage PowerShell for automating specific tasks</li>
<li>Combine PowerShell modules and cmdlets to create scripts for automating more sophisticated workflows</li>
<li>Build scripts that automate collaboration functions and services leveraging a strong PowerShell foundation developed throughout the course</li>
</ul>
<h2 id="tech-setup">Tech Setup</h2>
<p>At a minimum you just need a recent version of Powershell and a text editor.</p>
<p>However, the tools below are very nice to have:</p>
<ul>
<li>Windows 10</li>
<li><a href="https://github.com/PowerShell/PowerShell" rel="nofollow" target="_blank">Powershell &gt;=7</a></li>
<li><a href="https://code.visualstudio.com/" rel="nofollow" target="_blank">Visual Studio Code</a>
<ul>
<li>Extension: <a href="https://marketplace.visualstudio.com/items?itemName=ms-vscode.PowerShell" rel="nofollow" target="_blank">Powershell</a></li>
</ul>
</li>
<li><a href="https://github.com/microsoft/terminal" rel="nofollow" target="_blank">Windows Terminal</a></li>
<li><a href="https://git-scm.com/" rel="nofollow" target="_blank">Git</a></li>
</ul></template><!--astro:end--></astro-island><astro-island uid="A6frb" component-url="/_astro/TabContent.BR4ZjWmL.js" component-export="TabContent" renderer-url="/_astro/client.CGNJ_0cx.js" props="{&quot;tabID&quot;:[0,&quot;1&quot;]}" ssr client="only" opts="{&quot;name&quot;:&quot;TabContent&quot;,&quot;value&quot;:&quot;react&quot;}" await-children><template data-astro-template><div class="clear-both flex flex-col w-4/5 mt-4"><a href="/decks/powershell/000-introductions/" class="flex justify-between text-sm font-mono pb-6 no-underline group"><span class="flex flex-col justify-start content-start items-start group-hover:text-neutral-500 dark:group-hover:text-neutral-100"><div class="font-bold text-xl group-hover:underline opacity-90">Introductions</div><div class="text-left py-1">About the seminar, what to expect, and personal introductions.</div></span></a><a href="/decks/powershell/010-big-picture/" class="flex justify-between text-sm font-mono pb-6 no-underline group"><span class="flex flex-col justify-start content-start items-start group-hover:text-neutral-500 dark:group-hover:text-neutral-100"><div class="font-bold text-xl group-hover:underline opacity-90">Big Picture</div><div class="text-left py-1">Where PowerShell came from, how it compares to other shells, and an honest look at what it does well and badly.</div></span></a><a href="/decks/powershell/020-terminal/" class="flex justify-between text-sm font-mono pb-6 no-underline group"><span class="flex flex-col justify-start content-start items-start group-hover:text-neutral-500 dark:group-hover:text-neutral-100"><div class="font-bold text-xl group-hover:underline opacity-90">Terminal</div><div class="text-left py-1">Getting productive at the terminal: cmdlets, pipes and streams, and PowerShell drives.</div></span></a><a href="/decks/powershell/030-expressions/" class="flex justify-between text-sm font-mono pb-6 no-underline group"><span class="flex flex-col justify-start content-start items-start group-hover:text-neutral-500 dark:group-hover:text-neutral-100"><div class="font-bold text-xl group-hover:underline opacity-90">Expressions</div><div class="text-left py-1">PowerShell language fundamentals: variables, comments, strings, conditionals, iteration, and simple functions.</div></span></a><a href="/decks/powershell/040-collections/" class="flex justify-between text-sm font-mono pb-6 no-underline group"><span class="flex flex-col justify-start content-start items-start group-hover:text-neutral-500 dark:group-hover:text-neutral-100"><div class="font-bold text-xl group-hover:underline opacity-90">Collections</div><div class="text-left py-1">Working with data in bulk: arrays, enumeration, and hash tables.</div></span></a><a href="/decks/powershell/050-functions/" class="flex justify-between text-sm font-mono pb-6 no-underline group"><span class="flex flex-col justify-start content-start items-start group-hover:text-neutral-500 dark:group-hover:text-neutral-100"><div class="font-bold text-xl group-hover:underline opacity-90">Functions</div><div class="text-left py-1">From simple functions to advanced ones: typed parameters, script blocks, validation, and the Begin/Process/End pipeline lifecycle.</div></span></a><a href="/decks/powershell/060-objects/" class="flex justify-between text-sm font-mono pb-6 no-underline group"><span class="flex flex-col justify-start content-start items-start group-hover:text-neutral-500 dark:group-hover:text-neutral-100"><div class="font-bold text-xl group-hover:underline opacity-90">Objects</div><div class="text-left py-1">Why PowerShell passes objects instead of text, and how to define your own classes and enumerations.</div></span></a><a href="/decks/powershell/070-quality/" class="flex justify-between text-sm font-mono pb-6 no-underline group"><span class="flex flex-col justify-start content-start items-start group-hover:text-neutral-500 dark:group-hover:text-neutral-100"><div class="font-bold text-xl group-hover:underline opacity-90"
